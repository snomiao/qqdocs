name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (required for trusted publishing / OIDC)
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test || echo "no tests"

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release

      - name: Publish to npm if version not on registry
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "qqdocs@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "qqdocs@$PKG_VERSION already on npm, skipping publish"
          else
            echo "Publishing qqdocs@$PKG_VERSION with provenance"
            npm publish --provenance --access public
          fi

      - name: Build cross-platform binaries
        run: bun run build:all

      - name: Upload binaries to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="v${PKG_VERSION}"
          for f in dist/qqdocs-*; do
            echo "Uploading $f to $TAG"
            gh release upload "$TAG" "$f" --clobber || echo "skipped $f (release may not exist)"
          done
